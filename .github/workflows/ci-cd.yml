# .github/workflows/ci-cd.yml
name: CI/CD Pipeline

# Trigger: run on every push and pull request to main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── JOB 1: Run Tests ──────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest         # GitHub gives us a free Linux VM

    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Pulls your code into the VM

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'             # Caches node_modules for speed

      - name: Install dependencies
        run: npm ci                # Clean install (better than npm install in CI)

      - name: Run tests with coverage
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/          # Saves test coverage as a downloadable artifact

  # ── JOB 2: Build (only runs if tests pass) ────────────────
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    needs: test                    # This job WAITS for test job to succeed

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate app starts
        run: |
          node src/app.js &        # Start app in background
          sleep 2                  # Wait 2 seconds for it to start
          curl -f http://localhost:3000 && echo "✅ App is healthy"
          kill %1                  # Stop the background process

  # ── JOB 3: Deploy (only on push to main, not PRs) ─────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build                   # Only runs after build succeeds
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate deployment
        run: |
          echo "🚀 Deploying to production..."
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "✅ Deployment successful!"

      - name: Create deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY